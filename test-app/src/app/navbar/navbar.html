<nav class="navbar" data-cy="navbar">

  <a routerLink="/" class="logo" data-testid="logo" data-cy="logo">
    <span class="logo-icon">🍔</span>
    <span class="logo-main">Test</span>
    <span class="logo-accent">Bites</span>
  </a>

  <div class="nav-links">

    <a routerLink="/" routerLinkActive="active" class="nav-link">Home</a>
    <a routerLink="/products" routerLinkActive="active" class="nav-link">Products</a>
    <a routerLink="/about" routerLinkActive="active" class="nav-link">About</a>

  </div>

  <div class="cart-wrapper">

    <button class="cart-btn" (click)="toggleCart()" [disabled]="cartService.isProcessing" data-testid="open-cart"
      data-cy="open-cart">

      🛒 Cart

      <span *ngIf="cartService.getItemCount() > 0" class="cart-count" data-testid="cart-count" data-cy="cart-count">

        {{ cartService.getItemCount() }}

      </span>

    </button>

    <app-cart *ngIf="cartService.cartOpen"></app-cart>

  </div>

</nav>
